<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrow Crafter Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; text-align: center; padding: 40px 20px; }
        .container { max-width: 700px; margin: auto; background: #1e1e1e; padding: 30px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 15px-35px rgba(0,0,0,0.7); }
        .stats { font-size: 2rem; margin-bottom: 25px; color: #00d4ff; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        .button-group { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 30px; }
        button { padding: 12px 24px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; background: #2d5af1; color: white; transition: all 0.2s ease; }
        button:hover { background: #1a42cc; transform: translateY(-3px); }
        .reset-btn { background: #cc3333; margin-top: 25px; font-size: 0.9rem; }
        .attributes-list { text-align: left; background: #161616; padding: 20px; border-radius: 10px; border-left: 4px solid #00d4ff; min-height: 120px; }
        
        .attr-item { border-bottom: 1px solid #333; padding: 15px 0; animation: fadeIn 0.4s ease forwards; }
        .attr-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .attr-name { font-weight: bold; font-size: 1.1rem; color: #fff; }
        .attr-cost { color: #888; font-size: 0.8rem; background: #222; padding: 2px 8px; border-radius: 10px; }
        .attr-rules { color: #aaa; font-style: italic; font-size: 0.95rem; margin-top: 4px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="stats">Total Cost: <span id="totalCost">0</span></div>

    <div class="button-group">
        <button onclick="addPower(1)">Cost 1</button>
        <button onclick="addPower(2)">Cost 2</button>
        <button onclick="addPower(3)">Cost 3</button>
        <button onclick="addPower(4)">Cost 4</button>
        <button onclick="addPower(5)">Cost 5</button>
    </div>

    <div class="attributes-list" id="display">
        <p style="color: #555; text-align: center;">Craft your arrow by selecting costs...</p>
    </div>

    <button class="reset-btn" onclick="resetCraft()">Start New Arrow</button>
</div>

<script>
    let powersData = null;
    let currentTotal = 0;

    // Fetch the external JSON file
    async function loadPowers() {
        try {
            const response = await fetch('powers.json');
            powersData = await response.json();
        } catch (error) {
            console.error("Could not load powers.json", error);
        }
    }

    async function addPower(cost) {
        // Ensure data is loaded
        if (!powersData) await loadPowers();
        
        const list = powersData[cost];
        const power = list[Math.floor(Math.random() * list.length)];
        
        currentTotal += cost;
        document.getElementById('totalCost').innerText = currentTotal;

        const display = document.getElementById('display');
        if (display.innerText.includes("Craft your arrow")) display.innerHTML = '';

        const div = document.createElement('div');
        div.className = 'attr-item';
        div.innerHTML = `
            <div class="attr-header">
                <span class="attr-name">${power.name}</span>
                <span class="attr-cost">Cost ${cost}</span>
            </div>
            <div class="attr-rules">${power.rules}</div>
        `;
        display.appendChild(div);
    }

    function resetCraft() {
        currentTotal = 0;
        document.getElementById('totalCost').innerText = "0";
        document.getElementById('display').innerHTML = '<p style="color: #555; text-align: center;">Craft your arrow by selecting costs...</p>';
    }

    // Initialize data on load
    loadPowers();
</script>

</body>
</html>
