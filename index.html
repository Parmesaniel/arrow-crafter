<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrow Crafter</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 50px; }
        .container { max-width: 600px; margin: auto; background: #2a2a2a; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .stats { font-size: 1.5rem; margin-bottom: 20px; color: #ffd700; }
        .button-group { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; background: #4a90e2; color: white; transition: 0.2s; }
        button:hover { background: #357abd; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        .reset-btn { background: #e74c3c; margin-top: 20px; }
        .reset-btn:hover { background: #c0392b; }
        .attributes-list { text-align: left; background: #333; padding: 15px; border-radius: 8px; min-height: 100px; }
        .attr-item { border-bottom: 1px solid #444; padding: 8px 0; display: flex; justify-content: space-between; }
        .attr-cost { color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>Arrow Crafter</h1>
    
    <div class="stats">
        Total Cost: <span id="totalCost">0</span>
    </div>

    <div class="button-group">
        <button onclick="addPower(1)">+1 Cost</button>
        <button onclick="addPower(2)">+2 Cost</button>
        <button onclick="addPower(3)">+3 Cost</button>
        <button onclick="addPower(4)">+4 Cost</button>
        <button onclick="addPower(5)">+5 Cost</button>
    </div>

    <div class="attributes-list" id="display">
        <p style="color: #666; text-align: center;">Click a button to add attributes...</p>
    </div>

    <button class="reset-btn" onclick="resetCraft()">Reset Arrow</button>
</div>

<script>
    // --- Configuration: Add your powers here! ---
    const powers = {
        1: ["Feather-light", "Neon Glow", "Splintering", "Wooden Tip"],
        2: ["Iron Head", "Double Notch", "Increased Velocity", "Quick Draw"],
        3: ["Fire Aspect", "Frost Bite", "Homing Fin", "Piercing"],
        4: ["Explosive Payload", "Chain Lightning", "Vampiric Drain"],
        5: ["Dragon Breath", "Gravity Well", "Temporal Rift"]
    };

    let currentTotal = 0;

    function addPower(cost) {
        const list = powers[cost];
        const randomPower = list[Math.floor(Math.random() * list.length)];
        
        // Update Total
        currentTotal += cost;
        document.getElementById('totalCost').innerText = currentTotal;

        // Update Display
        const display = document.getElementById('display');
        if (currentTotal === cost) display.innerHTML = ''; // Clear placeholder on first click

        const div = document.createElement('div');
        div.className = 'attr-item';
        div.innerHTML = `<span>${randomPower}</span> <span class="attr-cost">(Cost ${cost})</span>`;
        display.appendChild(div);
    }

    function resetCraft() {
        currentTotal = 0;
        document.getElementById('totalCost').innerText = "0";
        document.getElementById('display').innerHTML = '<p style="color: #666; text-align: center;">Click a button to add attributes...</p>';
    }
</script>

</body>
</html>
